  tier_3:
    federation_agreement_reference: ""
    amendment_or_new: ""  # amendment | new-agreement
    start_date: ""
    outcome: ""
    end_date: ""

resolution:
  outcome_type: ""  # mutual-agreement | federation-amendment | agree-to-disagree | engagement-tier-reduction
  outcome_description: ""
  ratification_records:
