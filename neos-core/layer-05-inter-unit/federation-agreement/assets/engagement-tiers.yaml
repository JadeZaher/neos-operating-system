# Graduated Engagement Tiers
# Layer V -- Inter-Unit Coordination
# Defines the four levels of inter-ETHOS engagement

tiers:
  - name: observe
    label: "Observe"
    description: "Mutual acknowledgment. No commitments. ETHOS recognize each other's existence and governance legitimacy."
    requirements:
      - "Both ETHOS are recognized within the ecosystem"
    commitments: []
    coordination_mechanisms:
      - "No formal coordination required"
      - "ETHOS may exchange public information voluntarily"
    transition_to_cooperate:
      requires: "Either ETHOS submits a cross-ETHOS request"
      process: "No formal agreement needed -- cooperation is per-request"

  - name: cooperate
    label: "Cooperate"
    description: "Case-by-case collaboration through cross-ETHOS requests. No standing commitments. Each interaction is individually authorized."
    requirements:
      - "Mutual acknowledgment (observe tier) established"
      - "At least one completed cross-ETHOS request between the ETHOS"
    commitments:
      - "Respond to cross-ETHOS requests within stated timelines"
      - "Designate an inbound contact for request routing"
    coordination_mechanisms:
      - "Cross-ETHOS requests per cross-ethos-request skill"
      - "No standing liaison or shared governance"
    transition_to_federate:
      requires: "Both ETHOS ratify a federation agreement"
      process: "Full federation-agreement skill process"

  - name: federate
    label: "Federate"
    description: "Formal agreement with shared protocols, regular coordination, and designated liaisons. Standing commitments for defined domains."
    requirements:
      - "Ratified federation agreement between participating ETHOS"
      - "Designated liaison roles established"
      - "Regular coordination cadence defined"
    commitments:
      - "Maintain liaison roles per inter-unit-liaison skill"
      - "Report per agreed cadence"
      - "Honor shared protocols defined in the agreement"
      - "Process cross-ETHOS requests related to federated domains with priority"
    coordination_mechanisms:
      - "Standing liaison relationships"
      - "Regular coordination meetings"
      - "Shared resource stewardship (if applicable)"
      - "Joint advice phases for federated-domain decisions"
    transition_to_integrate:
      requires: "All ETHOS ratify an integration amendment to their federation agreement"
      process: "Full amendment process with all-ETHOS consent"

  - name: integrate
    label: "Integrate"
    description: "Deep structural integration with shared governance bodies, joint decision-making on defined domains, and pooled resources."
    requirements:
      - "Existing federation agreement at 'federate' tier"
      - "At least 12 months of successful federated coordination"
      - "All participating ETHOS ratify integration terms"
    commitments:
      - "Participate in shared governance bodies for integrated domains"
      - "Pool resources for integrated functions"
      - "Joint decision-making through shared ACT processes for defined domains"
      - "Maintain structural separation for non-integrated domains"
    coordination_mechanisms:
      - "Shared governance circles or coordination bodies"
      - "Joint ACT processes for integrated domains"
      - "Pooled resource stewardship"
      - "Integrated reporting and accountability"
    transition_down:
      requires: "Any ETHOS may request tier reduction through agreement amendment"
      process: "Full amendment process -- tier reduction is a legitimate structural choice, not a failure"

default_tier: observe
notes:
  - "New ETHOS default to 'observe' tier with all existing ETHOS"
  - "Tier transitions require formal federation agreement amendment"
  - "ETHOS may hold different tiers with different partner ETHOS"
  - "Tier reduction is a legitimate governance choice, not a penalty"
  - "Integration does not merge ETHOS -- each maintains internal autonomy for non-integrated domains"
