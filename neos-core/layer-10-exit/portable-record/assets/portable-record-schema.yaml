# Portable Governance Record Schema -- defines the structure of the output artifact
# Generated by the portable-record skill. Owned by the member, not the ecosystem.

record:
  record_id: ""                   # e.g. PGR-OMNI-2026-RINA
  schema_version: "1.0.0"        # for backward-compatible parsing
  generation_date: ""             # ISO date
  format: ""                      # yaml | json | markdown
  verification_hash: ""           # cryptographic hash of record + registry state
  generated_under: ""             # "normal" | "emergency" | "post-departure"

member:
  member_id: ""                   # ecosystem identity
  display_name: ""                # human-readable name (if member consents)
  membership_start: ""            # ISO date
  membership_end: ""              # ISO date (blank if still active)
  departure_status: ""            # "active" | "departed" | "dissolved-ethos"

ecosystems:
  - ecosystem_name: ""            # e.g. "OmniOne"
    ecosystem_id: ""
    membership_period:
      start: ""                   # ISO date
      end: ""                     # ISO date or "present"
    ethos_participated: []        # list of ETHOS names

roles:                            # included if member selects "full" or "summary"
  detail_level: ""                # full | summary | excluded
  entries:
    - role_name: ""
      circle: ""
      ethos: ""
      start_date: ""              # ISO date
      end_date: ""                # ISO date
      tenure_cycles: 0
      handoff_method: ""          # "transferred" | "distributed" | "dissolved"
      source_ref: ""              # e.g. "role-assignment:RA-SHUR-2025-014"

agreements:                       # included if member selects "full" or "summary"
  detail_level: ""
  entries:
    - agreement_name: ""
      agreement_id: ""
      role_in_agreement: ""       # "creator" | "party" | "steward"
      join_date: ""               # ISO date
      exit_date: ""               # ISO date
      exit_method: ""             # "departed" | "amended-out" | "agreement-closed"
      source_ref: ""

proposals:                        # included if member selects "full" or "summary"
  detail_level: ""
  entries:
    - proposal_title: ""
      proposal_id: ""
      role: ""                    # "author" | "co-author"
      submitted_date: ""          # ISO date
      outcome: ""                 # "consented" | "withdrawn" | "transferred" | "in-process"
      source_ref: ""

act_participation:                # included if member selects "full" or "summary"
  detail_level: ""
  summary:
    total_decisions_participated: 0
    consent_given: 0
    objections_raised: 0
    objections_integrated: 0
  entries:                        # only populated if detail_level is "full"
    - decision_id: ""
      decision_date: ""           # ISO date
      position: ""                # "consent" | "objection" | "stand-aside" | "absent"
      source_ref: ""

conflict_resolution:              # included if member selects "full" or "summary"
  detail_level: ""
  entries:
    - conflict_id: ""
      role: ""                    # "disputant" | "mediator" | "facilitator"
      start_date: ""              # ISO date
      end_date: ""                # ISO date
      outcome: ""                 # "resolved" | "escalated" | "paused" | "departed"
      source_ref: ""

resources:                        # included if member selects "full" or "summary"
  detail_level: ""
  entries:
    - resource_type: ""           # "current-see" | "allocation" | "stewardship"
      description: ""
      amount: ""
      period: ""
      status: ""                  # "active" | "returned" | "transferred" | "settled"
      source_ref: ""

current_see_history:              # included if member selects "full" or "summary"
  detail_level: ""
  summary:
    total_months_participating: 0
    allocation_per_period: ""     # e.g. "111 per person"
  entries:
    - period: ""                  # e.g. "2025-Q3"
      allocated: 0
      exercised: 0
      source_ref: ""

departure_records:                # always included (mandatory minimum)
  - departure_id: ""
    departure_date: ""            # ISO date
    scope: ""                     # "ethos" | "ecosystem"
    ecosystem: ""
    ethos: ""
    re_entry_eligible: true
    source_ref: ""

markdown_summary: |
  # Portable Governance Record
  Generated: [date]
  Member: [name]
  Ecosystem: [ecosystem]
  Tenure: [start] to [end]
  [Summary statistics and highlights]
