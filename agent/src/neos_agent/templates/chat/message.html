<!--
  Chat message fragment templates.

  These fragments are NOT rendered by Jinja2 — they are assembled by the
  Python functions in neos_agent.views.chat and delivered via standard SSE
  events (append / morph / skill / done). This file exists as a reference
  for the HTML structure each renderer produces. See chat.py for the
  authoritative implementations.

  SSE event types:
    append  — insert fragment at the end of #chat-messages
    morph   — replace the element whose id matches the fragment root id
    skill   — JSON payload {"name": "skill-name"} to update the badge
    done    — empty payload; signals stream completion

  ===== Agent message =====
  Rendered by: render_agent_message(text, message_id=None)
  SSE event: append (initial placeholder), then morph (streaming updates)

  <div class="flex gap-3 mb-4" id="{message_id}">
    <div class="w-8 h-8 rounded-full bg-neos-primary text-white flex items-center justify-center text-sm font-bold flex-shrink-0">A</div>
    <div class="flex-1 bg-neos-surface border border-neos-border rounded-lg p-3 text-sm">{escaped text with <br> for newlines}</div>
  </div>

  ===== User message =====
  Rendered by: render_user_message(text)
  SSE event: append

  <div class="flex justify-end mb-4">
    <div class="max-w-[80%] bg-neos-primary text-white rounded-lg p-3 text-sm">{escaped text with <br> for newlines}</div>
  </div>

  ===== System message (typing / error / info) =====
  Rendered by: render_system_message(msg_type, text)
  SSE event: append

  <div class="flex justify-center mb-3" id="typing-indicator">
    <div class="text-xs {color_class} italic px-3 py-1">{escaped text}</div>
  </div>

  Note: id="typing-indicator" only present when msg_type == "typing".
  To remove the typing indicator a morph event sends an empty div with
  the same id, which the client replaces via outerHTML.

  ===== Tool indicator =====
  Rendered by: render_tool_indicator(tool_name, status, args=None, result=None, link_url=None, link_label=None)
  SSE event: append

  <div class="flex flex-col gap-0.5 mb-3 px-3 py-2 border-l-4 rounded-r {border_class} text-sm">
    <div class="flex items-start gap-2">
      <span class="font-mono font-medium">{tool_name}</span>
      <span class="text-xs px-1.5 py-0.5 rounded bg-white/50">{status}</span>
      <span class="text-xs text-neos-muted ml-2">{json args}</span>   (optional)
    </div>
    <div class="mt-1 text-xs text-neos-muted">{result text}</div>     (optional)
    <a href="{link_url}" ...>{link_label} &rarr;</a>                   (optional)
  </div>

  ===== Skill transition banner =====
  Rendered by: render_transition_indicator(skill_name)
  SSE event: append (HTML), followed by a skill event (JSON)

  <div class="flex items-center justify-center gap-2 my-4 py-2 bg-neos-accent/10 rounded-lg text-sm">
    <span class="text-neos-muted">Skill transition:</span>
    <span class="font-semibold text-neos-primary">{skill_name}</span>
  </div>
-->
