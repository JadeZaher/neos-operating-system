{# Member picker partial — loaded into #member-list via htmx #}
{% if members %}
<div class="divide-y divide-neos-border">
  {% for m in members %}
  <button
    type="button"
    onclick="toggleMember('{{ m.id }}', '{{ m.display_name | replace("'", "\\'") }}')"
    class="w-full text-left px-3 py-2 hover:bg-neos-surface-alt transition-colors flex items-center gap-3"
  >
    <div class="w-8 h-8 rounded-full bg-neos-accent/20 text-neos-primary flex items-center justify-center text-sm font-bold shrink-0">
      {{ m.display_name[0] | upper if m.display_name else '?' }}
    </div>
    <div class="flex-1 min-w-0">
      <span class="text-sm font-medium text-neos-text block truncate">{{ m.display_name }}</span>
      {% if m.profile %}
      <span class="text-xs text-neos-muted">{{ m.profile | replace('_', ' ') }}</span>
      {% endif %}
    </div>
    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">active</span>
  </button>
  {% endfor %}
</div>
{% else %}
<div class="text-center py-4 text-sm text-neos-muted">
  No members found
</div>
{% endif %}
