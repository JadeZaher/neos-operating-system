{# Conversation list partial — loaded into #conversation-list via htmx #}
{% if conversations %}
<div class="divide-y divide-neos-border" hx-get="/messaging/conversations" hx-trigger="refresh from:body" hx-target="#conversation-list">
  {% for item in conversations %}
  {% set convo = item.conversation %}
  {% set last_msg = item.last_message %}
  <button
    type="button"
    class="w-full text-left px-4 py-3 hover:bg-neos-surface-alt transition-colors flex gap-3 items-start"
    hx-get="/messaging/conversations/{{ convo.id }}"
    hx-target="#conversation-detail"
    hx-swap="innerHTML"
    onclick="
      document.getElementById('conversation-detail').classList.remove('hidden');
      document.getElementById('conversation-detail').classList.add('flex');
      document.getElementById('conversation-detail').dataset.conversationId = '{{ convo.id }}';
      {# Hide conversation panel on mobile #}
      if (window.innerWidth < 768) {
        document.getElementById('conversation-panel').classList.add('hidden');
      }
    "
  >
    {# Avatar #}
    {% if convo.type == 'dm' %}
    <div class="w-10 h-10 rounded-full bg-neos-accent/20 text-neos-primary flex items-center justify-center text-sm font-bold shrink-0">
      {{ item.display_title[0] | upper if item.display_title else '?' }}
    </div>
    {% else %}
    <div class="w-10 h-10 rounded-full bg-neos-primary/15 text-neos-primary flex items-center justify-center shrink-0">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </div>
    {% endif %}

    {# Content #}
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-2 mb-0.5">
        <span class="text-sm font-medium text-neos-text truncate">{{ item.display_title }}</span>
        {% if last_msg %}
        <span class="text-xs text-neos-muted whitespace-nowrap shrink-0">
          {{ last_msg.created_at.strftime('%b %d') if last_msg.created_at else '' }}
        </span>
        {% endif %}
      </div>
      <div class="flex items-center justify-between gap-2">
        <p class="text-xs text-neos-muted truncate">
          {% if last_msg %}
            {% if last_msg.deleted_at %}
              <em>Message deleted</em>
            {% elif last_msg.message_type == 'system' %}
              <em>{{ last_msg.content[:60] }}</em>
            {% else %}
              {{ last_msg.content[:60] }}{% if last_msg.content | length > 60 %}...{% endif %}
            {% endif %}
          {% else %}
            No messages yet
          {% endif %}
        </p>
        {% if item.unread_count > 0 %}
        <span class="bg-neos-primary text-white text-xs font-bold rounded-full px-1.5 py-0.5 shrink-0">
          {{ item.unread_count if item.unread_count < 100 else '99+' }}
        </span>
        {% endif %}
      </div>
    </div>
  </button>
  {% endfor %}
</div>
{% else %}
<div class="flex flex-col items-center justify-center h-32 text-center px-4">
  <p class="text-sm text-neos-muted mb-2">No conversations yet</p>
  <button
    type="button"
    onclick="document.getElementById('member-picker-modal').classList.remove('hidden')"
    class="text-xs text-neos-primary hover:text-neos-secondary font-medium"
  >
    Start a conversation
  </button>
</div>
{% endif %}
